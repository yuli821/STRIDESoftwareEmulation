time:
  clk_period_ns: 4.0
  delta_bin_ns: 10000.0
  H_bins_per_epoch: 10
  num_epochs: 500
topology:
  num_stateless_queues: 8
  num_stateful_queues: 8
  num_stateless_buckets: 128
  num_stateful_buckets: 128
  num_cores_stateless: 8
  num_cores_stateful: 8
  queue_to_core_map_stateless: one_to_one
  queue_to_core_map_stateful: one_to_one
  # Random bucket->queue mapping gives an uneven starting load: since
  # the 5-tuples are randomly generated, per-bucket byte counts are
  # already non-uniform, and a random RSS lets hot buckets collide on
  # the same queue instead of round-robining across queues.
  initial_rss_stateless: random
  initial_rss_stateful: random
  descriptor_ring_depth_stateless: 2048
  descriptor_ring_depth_stateful: 2048
workload:
  source: trace_mix
  # Stateless offered ~ 45 Gbps. Single-core capacity at T_app=400 ns
  # with IMIX-weighted avg packet ~540 B is ~11 Gbps; total 8-core
  # capacity ~86 Gbps. So the MEAN load per queue (~5.6 Gbps) is
  # comfortably below capacity, but random 5-tuple hashing + random
  # RSS collapses several heavy flows onto one queue, pushing it past
  # its core's packet-rate budget -> credit drops + high P_q.
  # Flow counts are intentionally small so per-bucket variance stays
  # high (law of large numbers would otherwise wash the skew out).
  trace_mix_stateless:
  - kind: cache
    n_flows: 24
    gbps: 18.0
  - kind: web
    n_flows: 32
    gbps: 15.0
  - kind: hadoop
    n_flows: 8
    gbps: 12.0
  # Stateful offered ~ 20 Gbps; per-core capacity at T_app=2 us is
  # only ~3 Gbps so a queue carrying >3 Gbps of small web packets
  # saturates its core. Mean per-queue load ~2.5 Gbps keeps the
  # system below the cliff, so only the skewed queues drop.
  trace_mix_stateful:
  - kind: web
    n_flows: 16
    gbps: 12.0
  - kind: hadoop
    n_flows: 4
    gbps: 8.0
  max_link_gbps: 200.0
  hash_mode: toeplitz
  pattern_shift_period_epochs: 300
host:
  # DPDK poller cost: 300 ns is the floor for trivial RX/TX. Real
  # stacks with L2/L3 classification + counters land in 300-500 ns.
  # We use 400 ns so 8 cores cap at ~86 Gbps and skews are visible.
  stateless_t_app_mean_ns: 400.0
  stateless_t_app_jitter_ns: 60.0
  stateful_t_app_mean_ns: 2000.0
  stateful_t_app_jitter_ns: 400.0
  stateful_per_conn_lookup_ns: 80.0
  t_writeback_ns: 500.0
  rtt_calibration_t_app_base_ns: 300.0
  rtt_table:
  - - 64
    - 3800.0
  - - 128
    - 3950.0
  - - 256
    - 3980.0
  - - 512
    - 4000.0
  - - 1024
    - 4100.0
  - - 2048
    - 4200.0
  - - 4096
    - 4500.0
  use_pcie_link: true
  # Raised from the VCK190 effective bandwidth (64 Gbps) to 128 Gbps so
  # that PCIe is NOT the bottleneck under the tuned workload above --
  # the goal of this config is to stress core / queue pressure.
  pcie_bandwidth_gbps: 128.0
  fpga_egress_fifo_bytes: 262144
  pcie_setup_ns: 0.0
arbiter:
  policy: wrr
  wrr_weight_stateless: 2
  wrr_weight_stateful: 1
telemetry:
  w1: 0.3
  w2: 0.2
  w3: 0.5
  eps: 1.0e-09
predictor:
  predictor_type: ewma
  W_window_epochs: 8
  ewma_alpha: 0.3
stateless_scheduler:
  scheduler_type: ewma_greedy
  # Weight queue pressure P_q much more than the predictor output R_hat:
  # H_q = 0.8 * P_q + 0.2 * R_hat. The predictor is a small corrective
  # signal; the main driver remains the measured pressure.
  alpha_blend: 0.8
  tau_hot_s: 0.55
  tau_cold_s: 0.25
  fit_condition_tolerance: 0.1
  max_moves_per_epoch: 16
stateful_scheduler:
  scheduler_type: proposed
  eta1: 0.6
  eta2: 0.4
  tau_hot_t: 0.55
  tau_cold_t: 0.25
  lambda_t: 0.01
  epsilon_t: 0.001
  handoff_latency_ewma_alpha: 0.2
  max_concurrent_handoffs: 2
  handoff_buffer_bytes: 1000000
  handoff_drain_mean_ns: 20000.0
  handoff_drain_std_ns: 10000.0
  handoff_migration_mean_ns: 60000.0
  handoff_migration_std_ns: 15000.0
  handoff_ack_mean_ns: 20000.0
  handoff_ack_std_ns: 5000.0
experiment:
  name: ewma_greedy
  rng_seed: 12648430
  results_dir: results
  log_time_series: true
  log_per_bucket_trace: true
  make_plots: true
